services:
  casestore-main-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
    networks:
      - shared-proxy-network
    restart: unless-stopped

networks:
  shared-proxy-network:
    external: true
